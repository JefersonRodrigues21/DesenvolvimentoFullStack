<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo DOM 6</title>
</head>

<body>
    <form name="formCadastro" onsubmit="validarFormulario()">
        <label>Email</label>
        <input type="email" id="email">

        <label>Nome</label>
        <input type="text" id="nome">

        <button type="submit">Cadastrar</button>
    </form>
</body>

    <script>
        function validarFormulario(){
            let nomePessoa = document.forms['formCadastro']['nome'].value; // Acessando o valor do campo "nome" do formulário "formCadastro"
            if(nomePessoa === ''){ // Verificando se o campo 'nome' está vazio
                alert('Favor informar o seu nome!'); 
                event.preventDefault(); // Impedindo o envio do formulário
            } else{
                alert(`Olá, ${nomePessoa}!`);
                event.preventDefault(); 
            }
        }
    </script>

</html>
