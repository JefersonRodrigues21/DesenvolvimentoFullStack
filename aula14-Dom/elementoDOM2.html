<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemeno DOM exemplo 5</title>
</head>
<body>
    <h1>Usando seletor do DOM</h1>
    <ul>
        <li>Java</li>
        <li>Python</li>
        <li>NodeJS</li>
    </ul>

    <div id="conteudo" name="divconteudo" class="mensagem">

    </div>

    <div name='divconteudo' class="mensagem">

    </div>

    <div name='divconteudo' class="mensagem">

    </div>

    <span id="novospan" class="novo">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ad repudiandae itaque nobis perspiciatis, impedit, magnam a doloremque debitis quis quibusdam in quod, qui incidunt quos officia aperiam at neque nisi!
    </span>

    <div class="mensagem">

    </div>

</body>

<script>
    //? getElements x getElement = getElements pega Array.
    elemento0 = document.getElementsByTagName('li')[0]; // Seleciona o primeiro elemento <li>
    elemento0.style.color = 'blue'; // Altera a cor do texto do primeiro elemento para azul

    elemento1 = document.getElementsByTagName('li')[1];
    elemento1.style.background = 'red';

    elemento2 = document.getElementsByTagName('li')[2];
    elemento2.innerText = 'SprigBoot'; // Altera o texto do terceiro elemento para "SprigBoot"

    elementoDiv = document.getElementById('conteudo');
    elementoDiv.innerHTML = '<p> Estou colocando a tag p dentro da div </p>';

    elementoDivName = document.getElementsByName('divconteudo')[1];
    elementoDivName.style.color = 'blue';
    elementoDivName.innerHTML = '<p> Estou colocando um texto</p>'

    elementoDivClass = document.getElementsByClassName('mensagem')[2];
    elementoDivClass.innerHTML = '<p> Estou colocando a tag p dentro da div 2 </p>';

    elementoSpanClass = document.querySelector('.novo'); // Seleciona o primeiro elemento <span> com a classe "novo" - id = '#' e class = '.'
    elementoSpanClass.style.color = 'green';

    elementoSeletor = document.querySelectorAll('.mensagem')[3];
    elementoSeletor.innerHTML = '<p> Texto incluido! </p>';

</script>
</html>
