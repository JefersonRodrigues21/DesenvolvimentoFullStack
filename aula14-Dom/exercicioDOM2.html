<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM 2</title>
</head>
<body>
    <button onclick="confirma()">Excluir item</button>
</body>

<script>
    function confirma() {
        let confirmacao = confirm('Você deseja excluir esse item?');
        if(confirmacao){
            alert('Você irá excluir o item!');
        } else{
            alert('A operação foi cancelada!!!');
        }
    }
</script>
</html>
